    <title>Contact</title>
</head>
<body>
    <header>
        <div class="container-max">
            <a href="/">Enzo Gallardo</a>
            <nav>
                <ul>
                    <li><a href="/">Accueil</a></li>

                </ul>
            </nav>
            <a href="#" id="bars"><i class="fa-solid fa-bars"></i></a>  
        </div>
    </header>

    <main>
        <section class="contact marge">
            <div class="container-max">
                <h1>Contactez-moi</h1>
                <p>Vous avez un projet en tête ou une question ? N'hésitez pas à me contacter, je <br>Vous répondrai dans les plus brefs délais.</p>
                <form action="#">
                    <div class="form">
                        <div>
                            <label for="name">Nom</label>
                            <input type="text" id="name" name="user_name">
                        </div>
                        <div>                   
                            <label for="mail">Email</label>
                            <input type="email" id="mail" name="user_mail">
                        </div>
                        <div class="msg">                      
                            <label for="message">Message</label>
                            <textarea name="user_message" rows="8" id="message"></textarea>
                        </div>
                    </div>
                    <div class="checkbox">
                    <input type="checkbox" id="agree" name="agree" checked><label for="agree">J'accepte que mes données soient traitées conformément à la politique de confidentialité. Elles ne seront utilisées que pour répondre à ma demande.</label>
                    </div>
                    <button type="submit">Envoyez le message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container-max">

    </footer>
